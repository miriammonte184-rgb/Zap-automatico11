kind = "web"
previewPath = "/"
title = "ZapAuto - Consulta de Materiais"
version = "1.0.0"
id = "artifacts/zapauto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18227
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/zapauto run dev"

[services.env]
PORT = "18227"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/zapauto", "run", "build"]
publicDir = "artifacts/zapauto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
