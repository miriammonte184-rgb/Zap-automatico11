packages:
  "recharts": "Beautiful charting library for dashboard analytics"
  "framer-motion": "Smooth animations for page transitions and UI elements"
  "date-fns": "Easy date formatting for history and timestamps"
  "clsx": "Utility for constructing className strings"
  "tailwind-merge": "Utility to seamlessly merge Tailwind classes"
  "@radix-ui/react-slot": "For reusable component slots"

images:
